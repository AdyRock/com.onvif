<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" type="text/css" href="lwsa.css">
    <link rel="stylesheet" type="text/css" href="busy_indicator.css" />

    <style type="text/css">
        .fog_div {
            display: none;
            position: fixed;
            top: 0px;
            left: 0px;
            height: 100%;
            width: 100%;
            z-index: 100;
            background-color: rgba(30, 30, 30, 0.5);
        }

        #busybox.show {
            display: block;
        }

        #saveButton {
            display: block;
            background-color: #0f9e16;
            color: white;
            margin: 15px 20px 5px 5px;
        }

        .stats-card {
            border: 1px solid #d5d5d5;
            border-radius: 6px;
            background: #f7f9fc;
            padding: 12px;
            margin-bottom: 12px;
        }

        .stats-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        #statsLastRate {
            font-size: 1.2rem;
            font-weight: 600;
        }

        #statsList {
            max-height: 320px;
            overflow-y: auto;
            margin: 0;
            padding-left: 20px;
        }

        #statsList li {
            margin: 4px 0;
        }
    </style>

    <!-- The '/homey.js' script must be included in your settings view to work -->
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <script type="text/javascript" src="busy_indicator.js"></script>
</head>

<body>
    <!-- Busy indicator -->
    <div id="busybox" class="fog_div">
        <div></div>
    </div>

    <!-- Tab links -->
    <div class="tab">
        <button class="tablinks" onclick="setPage(event, 'settings')" id="defaultOpen"><span data-i18n="settings.settings"></span></button>
        <button class="tablinks" onclick="setPage(event, 'log')"><span data-i18n="settings.diagnosticsLog"></span></button>
        <button class="tablinks" onclick="setPage(event, 'statistics')"><span data-i18n="settings.statistics"></span></button>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings" class="tabcontent">
        <fieldset>
            <h1 data-i18n="settings.title"></h1>
            <div class="field row">
                <label class="homey-form-label" for="port" data-i18n="settings.port"></label>
                <input class="homey-form-input" id="port" type="text" value="" />
            </div>
            <div class="field row">
                <button class="homey-button-secondary-shadow" id="saveButton" data-i18n="settings.save"></button>
            </div>
        </fieldset>
    </div>

    <!-- LOG PAGE -->
    <div id="log" class="tabcontent">
        <div class="field row">
            <label class="homey-form-label" for="logLevel"><span data-i18n="settings.logLevel"></span></label>
            <select class="homey-form-select" id="logLevel">
                <option value=0 data-i18n="settings.logLevelErrorsOnly"></option>
                <option value=1 data-i18n="settings.logLevelBasic"></option>
                <option value=2 data-i18n="settings.logLevelDetailed"></option>
                <option value=3 data-i18n="settings.logLevelFull"></option>
            </select>
        </div>
        <div class="field row">
            <label class="homey-form-label"  for="email"><span data-i18n="settings.email"></span></label>
            <input class="homey-form-input" id="email" type="text" value="" />
            <P></P>
        </div>
        <p><button class="homey-button-secondary-shadow" id="clearLog"><span data-i18n="settings.ClearLog"></span></button> <button class="homey-button-secondary-shadow" id="sendLog"><span data-i18n="settings.SendLog"></span></button></p>
        <div class="field row">
            <textarea id="diagLog"></textarea>
        </div>
    </div>

    <!-- STATISTICS PAGE -->
    <div id="statistics" class="tabcontent">
        <div class="stats-card">
            <div class="stats-title" data-i18n="settings.statsLastRateTitle"></div>
            <div id="statsLastRate" data-i18n="settings.statsNoDataYet"></div>
        </div>
        <div class="stats-card">
            <div class="stats-title" data-i18n="settings.statsRateUpdatesTitle"></div>
            <ol id="statsList"></ol>
        </div>
    </div>

    <script type="text/javascript">
        // Create the busy indicator
        var busyi;
        busyi = new busy_indicator(document.getElementById("busybox"), document.querySelector("#busybox div"));

        var saveButtonElement = document.getElementById('saveButton');
        var portElement = document.getElementById('port');

        var diagLogElement = document.getElementById('diagLog');
        var logLevelElement = document.getElementById('logLevel');
        var clearLogElement = document.getElementById('clearLog');
        var sendLogElement = document.getElementById('sendLog');
        var emailElement = document.getElementById('email');
        var statsLastRateElement = document.getElementById('statsLastRate');
        var statsListElement = document.getElementById('statsList');
        var i18nText =
        {
            statsNoDataYet: '',
            statsNoUpdatesYet: '',
            statsRateUnit: '',
            statsEventsLabel: '',
            statsAtLabel: '',
            saveSuccess: '',
            sendLogConfirm: '',
            sendLogSuccess: '',
        };

        function initLocalizedText(Homey)
        {
            i18nText.statsNoDataYet = Homey.__('settings.statsNoDataYet');
            i18nText.statsNoUpdatesYet = Homey.__('settings.statsNoUpdatesYet');
            i18nText.statsRateUnit = Homey.__('settings.statsRateUnit');
            i18nText.statsEventsLabel = Homey.__('settings.statsEventsLabel');
            i18nText.statsAtLabel = Homey.__('settings.statsAtLabel');
            i18nText.saveSuccess = Homey.__('settings.saveSuccess');
            i18nText.sendLogConfirm = Homey.__('settings.sendLogConfirm');
            i18nText.sendLogSuccess = Homey.__('settings.sendLogSuccess');
        }

        function formatRateSample(sample)
        {
            if (!sample || typeof sample !== 'object')
            {
                return i18nText.statsNoDataYet;
            }

            var eps = Number(sample.eventsPerSecond);
            var events = Number(sample.eventsInWindow);
            var stamp = Number(sample.timestamp);
            var dateText = Number.isFinite(stamp) ? new Date(stamp).toLocaleTimeString() : '-';
            var epsText = Number.isFinite(eps) ? eps.toFixed(2) : '0.00';
            var eventsText = Number.isFinite(events) ? String(events) : '0';

            return epsText + ' ' + i18nText.statsRateUnit + ' (' + eventsText + ' ' + i18nText.statsEventsLabel + ') ' + i18nText.statsAtLabel + ' ' + dateText;
        }

        function renderRateStats(lastSample, history)
        {
            statsLastRateElement.textContent = formatRateSample(lastSample);

            statsListElement.innerHTML = '';
            if (!Array.isArray(history) || history.length === 0)
            {
                var emptyItem = document.createElement('li');
                emptyItem.textContent = i18nText.statsNoUpdatesYet;
                statsListElement.appendChild(emptyItem);
                return;
            }

            var maxItems = 10;
            var startIndex = history.length - 1;
            var endIndex = Math.max(history.length - maxItems, 0);

            for (var i = startIndex; i >= endIndex; i--)
            {
                var item = document.createElement('li');
                item.textContent = formatRateSample(history[i]);
                statsListElement.appendChild(item);
            }
        }

        function refreshRateStats(Homey)
        {
            Homey.get('pushEventRateLast', function(err, lastSample)
            {
                if (err) return Homey.alert(err);

                Homey.get('pushEventRateHistory', function(err2, history)
                {
                    if (err2) return Homey.alert(err2);
                    renderRateStats(lastSample, history);
                });
            });
        }

        // a method named 'onHomeyReady' must be present in your code
        function onHomeyReady(Homey)
        {
            // Tell Homey we're ready to be displayed
            Homey.ready();
            initLocalizedText(Homey);
            document.title = Homey.__('settings.pageTitle');

            document.getElementById("defaultOpen").click();

            Homey.on('settings.set', function()
            {
                Homey.get('port', function(err, port)
                {
                    if (err) return Homey.alert(err);
                    portElement.value = port;
                });

                Homey.get('diagLog', function(err, diagLog)
                {
                    if (err) return Homey.alert(err);
                    diagLogElement.value = diagLog;
                });

                refreshRateStats(Homey);
            });

            saveButtonElement.addEventListener('click', function()
            {
                Homey.set('port', portElement.value, function(err)
                {
                    if (err) return Homey.alert(err);
                    {
                        if (err)
                            {
                                Homey.alert(err);
                            }
                            else
                            {
                                Homey.alert(i18nText.saveSuccess);
                            }
                    }
                });
            });

            logLevelElement.addEventListener('change', function(e)
            {
                Homey.set('logLevel', logLevelElement.value, function(err)
                {
                    if (err) return Homey.alert(err);
                });
            });

            clearLogElement.addEventListener('click', function(e)
            {
                Homey.set('diagLog', "", function(err)
                {
                    if (err) return Homey.alert(err);
                });
                diagLogElement.value = "";
            });

            sendLogElement.addEventListener('click', function(e)
            {
                Homey.confirm(i18nText.sendLogConfirm, null, function(e, ok)
                {
                    if (ok)
                    {
                        waitCursor(true);
                        Homey.api('POST', '/SendLog/',
                        {
                            notify: true,
                            email: emailElement.value,
                        }, function(err, result)
                        {
                            if (err)
                            {
                                Homey.alert(err);
                            }
                            else
                            {
                                Homey.alert(i18nText.sendLogSuccess);
                            }
                            waitCursor(false);
                        });
                    }
                });
            });
        }

        function setPage(evt, tabPage)
        {
            var i, tabcontent, tablinks;

            // Get all elements with class="tabcontent" and hide them
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++)
            {
                tabcontent[i].style.display = "none";
            }

            // Get all elements with class="tablinks" and remove the class "active"
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++)
            {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            // Show the current tab, and add an "active" class to the button that opened the tab
            document.getElementById(tabPage).style.display = "block";
            evt.currentTarget.className += " active";

            if (tabPage == 'log')
            {
                // Refresh the log data
                Homey.get('logLevel', function(err, logLevel)
                {
                    if (err) return Homey.alert(err);
                    logLevelElement.value = String(logLevel);
                });

                Homey.get('diagLog', function(err, diagLog)
                {
                    if (err) return Homey.alert(err);
                    diagLogElement.value = diagLog;
                });

                // Make the log text area fill the page
                diagLogElement.setAttribute('cols', diagLogElement.parentElement.clientWidth / 8);
                diagLogElement.style.height = (window.innerHeight - diagLogElement.offsetTop - 40) + 'px';
            }
            else if (tabPage == 'settings')
            {
                // Refresh the port number
                Homey.get('port', function(err, port)
                {
                    if (err) return Homey.alert(err);
                    portElement.value = port;
                });
            }
            else if (tabPage == 'statistics')
            {
                refreshRateStats(Homey);
            }
        }

        function waitCursor(On)
        {
            if (On)
            {
                busyi.show();
            }
            else
            {
                busyi.hide();
            }
        }
    </script>

</body>

</html>
